# 在 Windows 上构建 markdow.exe 并随 Tag 发布 Release
# 用法：推送 tag 如 v1.0.0 即可触发构建并创建 Release，附带 markdow.exe

name: Build Windows CLI and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install pyinstaller
          .venv\Scripts\pip install -e "packages/markitdown[docx,xls]"

      - name: Build markdow.exe
        run: .venv\Scripts\pyinstaller.exe markdow.spec

      - name: Upload markdow.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdow-windows-exe
          path: dist/markdow.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download markdow.exe
        uses: actions/download-artifact@v4
        with:
          name: markdow-windows-exe

      - name: Create Release and upload markdow.exe
        uses: softprops/action-gh-release@v2
        with:
          files: markdow.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
