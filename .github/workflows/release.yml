# 在 Windows / Linux / macOS 上构建 markitdown 命令行工具，并随 Tag 发布 Release
# 触发方式：1) 手动 Run workflow  2) push 代码（如 main）  3) 推送 tag v* → 构建并创建 Release

name: Build CLI (Windows + Linux + macOS) and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: '3.12'
            artifact_name: markitdown-windows-amd64.exe
            exe_path: dist/markitdown.exe
          - os: ubuntu-latest
            python: '3.12'
            artifact_name: markitdown-linux-amd64
            exe_path: dist/markitdown
          - os: macos-latest
            python: '3.12'
            artifact_name: markitdown-darwin-arm64
            exe_path: dist/markitdown

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Create venv and install dependencies (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install pyinstaller
          .venv/bin/pip install -e "packages/markitdown[docx,xls]"

      - name: Create venv and install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install pyinstaller
          .venv\Scripts\pip install -e "packages/markitdown[docx,xls]"

      - name: Ensure magika model (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          .venv/bin/python - << 'PY'
          import os, urllib.request
          import magika
          pkg = magika.__path__[0]
          model_dir = os.path.join(pkg, "models", "standard_v3_3")
          os.makedirs(model_dir, exist_ok=True)
          model_file = os.path.join(model_dir, "model.onnx")
          config_file = os.path.join(model_dir, "config.min.json")
          base = "https://github.com/google/magika/raw/main/assets/models/standard_v3_3"
          if not os.path.isfile(model_file):
              urllib.request.urlretrieve(f"{base}/model.onnx", model_file)
              print("Downloaded model.onnx")
          if not os.path.isfile(config_file):
              urllib.request.urlretrieve(f"{base}/config.min.json", config_file)
              print("Downloaded config.min.json")
          assert os.path.isfile(model_file), "model.onnx missing"
          print("magika model OK:", model_dir)
          PY

      - name: Ensure magika model (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          .venv\Scripts\python.exe -c "
          import os, urllib.request
          import magika
          pkg = magika.__path__[0]
          model_dir = os.path.join(pkg, 'models', 'standard_v3_3')
          os.makedirs(model_dir, exist_ok=True)
          model_file = os.path.join(model_dir, 'model.onnx')
          config_file = os.path.join(model_dir, 'config.min.json')
          base = 'https://github.com/google/magika/raw/main/assets/models/standard_v3_3'
          if not os.path.isfile(model_file):
              urllib.request.urlretrieve(base + '/model.onnx', model_file)
              print('Downloaded model.onnx')
          if not os.path.isfile(config_file):
              urllib.request.urlretrieve(base + '/config.min.json', config_file)
              print('Downloaded config.min.json')
          assert os.path.isfile(model_file), 'model.onnx missing'
          print('magika model OK', model_dir)
          "

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: .venv/bin/pyinstaller markitdown.spec

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: .venv\Scripts\pyinstaller.exe markitdown.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.exe_path }}

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: markitdown-*
          path: release-artifacts

      - name: Rename to distinct filenames for Release
        run: |
          mkdir -p release
          for dir in release-artifacts/markitdown-*; do
            name=$(basename "$dir")
            f=$(find "$dir" -type f -print -quit)
            [ -n "$f" ] && cp "$f" "release/$name"
          done
          chmod +x release/markitdown-linux-amd64 release/markitdown-darwin-arm64 2>/dev/null || true
          ls -la release/

      - name: Create Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
